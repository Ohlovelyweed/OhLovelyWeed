<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cinzel',serif;
  color:white;
  background:url("https://i.imgur.com/5kajv5M.png") no-repeat center center fixed;
  background-size:cover;
  display:flex;
  justify-content:center;
}

/* CONTENEDOR PRINCIPAL */
.wrapper{
  text-align:center;
  margin-top:60px;
}

/* FOTO PERFIL */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #900;
  box-shadow:0 0 20px #900;
  margin-bottom:20px;
  order:1;
}

/* CONTENEDOR GENERAL */
.container{
  display:flex;
  flex-direction: column;
  align-items:center;
  gap:20px;
}

/* TARJETA DONACIONES */
.card{
  background:rgba(0,0,0,0.85);
  padding:30px 20px;
  border-radius:14px;
  width:90%;
  max-width:420px;
  box-shadow:0 0 40px rgba(120,0,0,0.6);
  border:1px solid #300;
  order:2;
}

h1{
  font-family:'UnifrakturCook',cursive;
  font-size:32px;
  color:#b30000;
  margin-top:0;
}

/* BOTONES DE DONACION */
button{
  display:block;
  width:100%;
  padding:16px;
  margin-top:15px;
  font-size:17px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.coffee{ background:#ffdd00; color:black; }
.revolut{ background:#111; color:white; }
.bizum{ background:#00a0df; color:white; }

/* VIDEO */
.video{
  width:90%;
  max-width:420px;
  border:3px solid #550000;
  border-radius:10px;
  box-shadow:0 0 20px #330000;
  overflow:hidden;
  background:#000;
  padding-bottom:15px;
  margin-bottom:20px;
  order:3;
}

.video video{
  width:100%;
  height:auto;
  display:block;
}

.video .telegram-container{
  text-align:center;
  margin-top:10px;
}

.video .telegram-container button{
  display:inline-block;
  width:45%;
  margin:5px;
  font-size:16px;
  padding:12px 5px;
  border-radius:8px;
  border:2px solid #b30000;
  background:#111;
  color:#00bfff;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px #00bfff;
}

.video .telegram-container button:hover{
  background:#222;
  transform:scale(1.05);
}

/* ================== MODO MÓVIL ================== */
@media (max-width:600px){

.wrapper{
  width:500px;
  max-width:100%;
  height:900px;
  margin-top:10px;
}

.profile{
  width:160px;
  height:160px;
}

.card{
  width:95%;
  padding:30px;
}

h1{
  font-size:40px;
}

/* BOTONES 20% MÁS PEQUEÑOS */
button{
  font-size:16px;
  padding:14px;
}

.video{
  width:95%;
}

.video .telegram-container button{
  width:48%;
  font-size:14px;
  padding:10px 5px;
}

}

</style>

<script>
function copiarBizum(){
  navigator.clipboard.writeText("622375679");
  alert("Número Bizum copiado: 622375679");
}
</script>

</head>

<body>

<div class="wrapper">

<div class="container">

<img class="profile" src="https://i.imgur.com/CNYxHGb.jpg">

<div class="card">
<h1>Apoya el proyecto</h1>
<p>Si deseas ayudar puedes hacer una donación.</p>

<button class="coffee"
onclick="window.location.href='https://buymeacoffee.com/ohlovelyweed'">
☕ Donar en BuyMeACoffee
</button>

<button class="revolut"
onclick="window.location.href='https://revolut.me/m_garciaruiza'">
💳 Donar con Revolut
</button>

<button class="bizum" onclick="copiarBizum()">
📱 Donar con Bizum
</button>

<p>Número Bizum: 622375679</p>
</div>

<div class="video">
<video controls autoplay loop muted>
<source src="Molchat-Doma.mp4" type="video/mp4">
Tu navegador no soporta este vídeo.
</video>

<div class="telegram-container">
<button onclick="window.location.href='https://t.me/+f0KhOU-pvCs5MDU0'">
🌑 Mi Grupo Personal
</button>

<button onclick="window.location.href='https://t.me/+Fijcu8cyH9IwZThk'">
🌕 Grupo de Contenido
</button>
</div>

</div>
</div>

</div>

<script>
const video = document.querySelector('.video video');
video.volume = 0.1;
</script>

</body>
</html>
