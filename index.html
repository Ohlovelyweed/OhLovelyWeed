<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Donaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cinzel',serif;
  color:white;
  background:url("https://i.imgur.com/5kajv5M.png") no-repeat center center fixed;
  background-size:cover;
}

.wrapper{
  text-align:center;
  margin-top:60px;
}

/* FOTO PERFIL */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #900;
  box-shadow:0 0 20px #900;
  margin-bottom:20px;
  order:1; /* Arriba */
}

/* CONTENEDOR GENERAL */
.container{
  display:flex;
  flex-direction: column; /* vertical por defecto */
  align-items:center;
  gap:20px;
}

/* TARJETA DONACIONES */
.card{
  background:rgba(0,0,0,0.85);
  padding:30px 20px;
  border-radius:14px;
  width:90%;
  max-width:420px;
  box-shadow:0 0 40px rgba(120,0,0,0.6);
  border:1px solid #300;
  order:2; /* después de la foto */
}

h1{
  font-family:'UnifrakturCook',cursive;
  font-size:32px;
  color:#b30000;
  margin-top:0;
}

/* BOTONES DE DONACION */
button{
  display:block;
  width:100%;
  padding:16px;
  margin-top:15px;
  font-size:17px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.coffee{ background:#ffdd00; color:black; }
.revolut{ background:#111; color:white; }
.bizum{ background:#00a0df; color:white; }

/* VELAS */
.candle{
  position:absolute;
  bottom:20px;
  width:20px;
  height:80px;
  background:#eee;
  border-radius:3px;
}

.flame{
  width:12px;
  height:20px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-20px;
  left:4px;
  animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* VIDEO + TELEGRAM */
.video{
  width:90%;
  max-width:420px;
  border:3px solid #550000;
  border-radius:10px;
  box-shadow:0 0 20px #330000;
  overflow:hidden;
  background:#000;
  padding-bottom:15px;
  margin-bottom:20px;
  order:3; /* después de la tarjeta */
}

.video video{
  width:100%;
  height:auto;
  display:block;
  border-radius:10px;
}

/* BOTONES DE TELEGRAM DENTRO DEL VIDEO */
.video .telegram-container{
  text-align:center;
  margin-top:10px;
}

.video .telegram-container button{
  display:inline-block;
  width:45%;
  margin:5px;
  font-size:16px;
  padding:12px 5px;
  border-radius:8px;
  border:2px solid #b30000;
  background:#111;
  color:#00bfff;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px #00bfff;
}

.video .telegram-container button:hover{
  background:#222;
  transform:scale(1.05);
  box-shadow:0 0 15px #00bfff;
}

/* ================== MEDIA QUERIES PARA MÓVILES ================== */
@media (max-width: 600px){
  .profile{
    width:180px;  /* 30% más grande que 140px */
    height:180px;
  }

  h1{
    font-size:46px; /* 30% más grande que 36px */
  }

  button{
    font-size:23px; /* 30% más grande que 18px */
    padding:21px;
  }

  .card{
    width:98%;
    padding:39px 33px; /* 30% más grande */
  }

  .video{
    width:98%;
    padding-bottom:26px; /* un poco más de espacio para botones */
  }

  .video video{
    height:auto;
  }

  .video .telegram-container button{
    width:48%;
    font-size:21px; /* 30% más grande */
    padding:16px 8px;
  }
}
</style>

<script>
function copiarBizum(){
  navigator.clipboard.writeText("622375679");
  alert("Número Bizum copiado: 622375679");
}
</script>

</head>
<body>

<div class="candle" style="left:40px;">
  <div class="flame"></div>
</div>

<div class="candle" style="right:40px;">
  <div class="flame"></div>
</div>

<div class="wrapper">

  <div class="container">

    <!-- FOTO PERFIL ARRIBA -->
    <img class="profile" src="https://i.imgur.com/CNYxHGb.jpg">

    <!-- CUADRO DONACIONES -->
    <div class="card">
      <h1>Apoya el proyecto</h1>
      <p>Si deseas ayudar puedes hacer una donación.</p>

      <button class="coffee"
      onclick="window.location.href='https://buymeacoffee.com/ohlovelyweed'">
      ☕ Donar en BuyMeACoffee
      </button>

      <button class="revolut"
      onclick="window.location.href='https://revolut.me/m_garciaruiza'">
      💳 Donar con Revolut
      </button>

      <button class="bizum" onclick="copiarBizum()">
      📱 Donar con Bizum
      </button>

      <p>Número Bizum: 622375679</p>
    </div>

    <!-- VIDEO CON BOTONES DE TELEGRAM -->
    <div class="video">
      <video width="420" height="240" controls autoplay loop muted>
        <source src="Molchat-Doma.mp4" type="video/mp4">
        Tu navegador no soporta este vídeo.
      </video>

      <div class="telegram-container">
        <button onclick="window.location.href='https://t.me/+f0KhOU-pvCs5MDU0'">
          🌑 Mi Grupo Personal
        </button>
        <button onclick="window.location.href='https://t.me/+Fijcu8cyH9IwZThk'">
          🌕 Grupo de Contenido
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// Volumen inicial del video al 10%
const video = document.querySelector('.video video');
video.volume = 0.1;
</script>

</body>
</html>
